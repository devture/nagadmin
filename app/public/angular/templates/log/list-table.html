<table ng-if="filteredEntities.length > 0" class="table table-bordered table-striped table-condensed">
	<thead>
		<tr>
			<th>Date</th>
			<th class="d-none d-sm-table-cell">Type</th>
			<th>Value</th>
		</tr>
	</thead>
	<tbody>
		<tr ng-repeat="entity in filteredEntities track by entity.id">
			<td nowrap="nowrap">
				<relative-time timestamp="entity.timestamp * 1000"></relative-time> ago
			</td>
			<td class="d-none d-sm-table-cell">
				{{ entity.type }}
			</td>
			<td>
				<span class="d-inline d-sm-none"><strong>{{ entity.type }}</strong>:</span>
				<span style="word-break: break-all;">
					{{ entity.value }}
				</span>

				<div ng-if="entity.infoLink != null">
					<a class="btn btn-secondary btn-sm float-end" href="{{ entity.infoLink }}">
						<img ng-if="entity.host.address != null" ng-src="//www.google.com/s2/favicons?domain={{ entity.host.address }}" alt="" />
						<i ng-if="entity.host.address == null" class="fa-solid fa-circle-info"></i>
					</a>
				</div>
			</td>
		</tr>
	</tbody>
</table>

<div ng-cloak class="help-block" ng-if="filteredEntities != null && filteredEntities.length == 0">
	No log entries.
</div>
