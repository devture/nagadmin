# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    nagadmin.mongodb.uri: '%env(MONGODB_URI)%'
    nagadmin.mongodb.db: '%env(MONGODB_DB)%'
    nagadmin.notifications.api_secret: '%env(NAGADMIN_NOTIFICATION_API_SECRET)%'
    # Display name for this deployment and the external Nagios web UI URL
    # (both surfaced in the layout/navbar).
    nagadmin.project_name: '%env(NAGADMIN_PROJECT_NAME)%'
    nagadmin.nagios.url: '%env(NAGADMIN_NAGIOS_URL)%'
    # Assignable user roles (key => human description), shown as checkboxes on
    # the user form and used to validate submitted roles. 'all' is the master role.
    nagadmin.user.roles:
        overseer: 'Overseer - the ability to see (but not edit) all host groups'
        configuration_management: 'Management - the ability to manage the Nagios configuration'
        sensitive: 'Sensitive information - like Resource Variables, Configuration, system logs'
        devture_user: 'User management - the ability to create/edit/delete user accounts'
        all: 'ALL'
    # Service-name patterns whose matches are treated as "master" services that
    # others depend on (same default as the legacy config.json).
    nagadmin.auto_service_dependency.master_service_regexes:
        - '/^ping$/i'
        - '/host-?alive/i'
    # Nagios runtime file paths (shared bind-mounted volume, fixed by the container layout).
    nagadmin.nagios.log_file_path: '/code/var/container-data/nagios/var/nagios.log'
    nagadmin.nagios.status_file_path: '/code/var/container-data/nagios/var/status.dat'
    nagadmin.nagios.command_file_path: '/code/var/container-data/nagios/var/rw/nagios.cmd'
    # Where the generated configuration is deployed (mounted read-only into the Nagios container).
    nagadmin.deployment.path: '/code/var/container-data/nagadmin-generated-config/'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        # The ported domain code under src/Devture/ lives in its own namespaces
        # (not App\), so it must be excluded from App\ autodiscovery. It autoloads
        # via composer PSR-4 and is wired explicitly where needed.
        exclude:
            - '../src/Devture/'

    # The MongoDB connection. The `array` type map makes find()/findOne() return
    # plain PHP arrays (not BSONDocument/BSONArray objects), matching what the
    # data models expect — mirroring the legacy application's wiring.
    MongoDB\Client:
        arguments:
            $uri: '%nagadmin.mongodb.uri%'

    MongoDB\Database:
        factory: ['@MongoDB\Client', 'selectDatabase']
        arguments:
            $databaseName: '%nagadmin.mongodb.db%'
            $options:
                typeMap: { root: array, document: array, array: array }

    # The Nagios repositories. Concrete-typed dependencies (sibling repositories,
    # the MongoDB database) autowire; the model-event dispatcher is bound explicitly.
    Devture\Bundle\NagiosBundle\Repository\TimePeriodRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\CommandRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\HostRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\ContactRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\ServiceRepository: ~
    Devture\Bundle\NagiosBundle\Repository\ResourceRepository: ~
    Devture\Bundle\NagiosBundle\Repository\UserRepository: ~

    # The contact repository depends on the user repository via its interface.
    Devture\Bundle\UserBundle\Repository\UserRepositoryInterface: '@Devture\Bundle\NagiosBundle\Repository\UserRepository'

    # Fine-grained, per-entity access rules (host/service/contact/log
    # visibility and management). Stateless; bridged into Symfony's
    # authorization layer by App\Security\Voter\NagiosAccessVoter.
    Devture\Bundle\NagiosBundle\Helper\AccessChecker: ~

    # User-management form validation (the form binder + controller autowire).
    Devture\Bundle\UserBundle\Validator\UserValidator:
        arguments:
            $repository: '@Devture\Bundle\UserBundle\Repository\UserRepositoryInterface'
            $knownRoles: '%nagadmin.user.roles%'

    # The Nagios configuration generator: exporters (one per config file),
    # the writer, and the collector that runs the exporters in order.
    Devture\Bundle\NagiosBundle\Deployment\Exporter\InternalConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\ResourceFileConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\TimePeriodsConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\ContactsConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\CommandsConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\HostGroupsConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\HostsConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\ServicesConfigurationExporter: ~
    Devture\Bundle\NagiosBundle\Deployment\Exporter\AutoServiceDepsConfigurationExporter:
        arguments:
            $masterServicesRegexes: '%nagadmin.auto_service_dependency.master_service_regexes%'

    Devture\Bundle\NagiosBundle\Deployment\ConfigurationWriter: ~

    Devture\Bundle\NagiosBundle\Deployment\ConfigurationCollector:
        calls:
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\InternalConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\ResourceFileConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\TimePeriodsConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\ContactsConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\CommandsConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\HostGroupsConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\HostsConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\ServicesConfigurationExporter']
            - addExporter: ['@Devture\Bundle\NagiosBundle\Deployment\Exporter\AutoServiceDepsConfigurationExporter']

    # Configuration validation (runs `nagios --verify-config` in this container) and
    # deployment (writes the config and, optionally, asks Nagios to reload).
    Devture\Bundle\NagiosBundle\Deployment\ConfigurationTester:
        arguments:
            $mainFileTemplatePath: '%kernel.project_dir%/src/Devture/Bundle/NagiosBundle/Resources/nagios_templates/nagios.cfg'
    Devture\Bundle\NagiosBundle\Deployment\Handler\DeploymentHandler:
        arguments:
            $path: '%nagadmin.deployment.path%'
    Devture\Bundle\NagiosBundle\Deployment\Handler\DeploymentHandlerInterface: '@Devture\Bundle\NagiosBundle\Deployment\Handler\DeploymentHandler'

    # Submitting external commands to Nagios via its command pipe.
    Devture\Bundle\NagiosBundle\NagiosCommand\Submitter:
        arguments:
            $commandFilePath: '%nagadmin.nagios.command_file_path%'
    Devture\Bundle\NagiosBundle\NagiosCommand\Manager: ~

    # Reading Nagios' live status (status.dat).
    Devture\Bundle\NagiosBundle\Status\Fetcher:
        arguments:
            $statusFilePath: '%nagadmin.nagios.status_file_path%'
    Devture\Bundle\NagiosBundle\Status\Manager: ~

    # Reading the Nagios log.
    Devture\Bundle\NagiosBundle\Log\Fetcher:
        arguments:
            $logFilePath: '%nagadmin.nagios.log_file_path%'

    # Initial installation: sets resource variables and deploys the configuration.
    Devture\Bundle\NagiosBundle\Install\Installer:
        arguments:
            $notificationApiSecret: '%nagadmin.notifications.api_secret%'

    # Model lifecycle subscribers, performing cascade updates/deletes. They resolve
    # their repositories lazily through a service locator (so the dispatcher can be
    # built without forcing the repository graph, which depends back on it).
    Devture\Bundle\NagiosBundle\Event\Subscriber\HostEventsSubscriber:
        arguments:
            $container: !service_locator
                devture_nagios.service.repository: '@Devture\Bundle\NagiosBundle\Repository\ServiceRepository'
    Devture\Bundle\NagiosBundle\Event\Subscriber\ContactEventsSubscriber:
        arguments:
            $container: !service_locator
                devture_nagios.service.repository: '@Devture\Bundle\NagiosBundle\Repository\ServiceRepository'
    Devture\Bundle\NagiosBundle\Event\Subscriber\CommandEventsSubscriber:
        arguments:
            $container: !service_locator
                devture_nagios.service.repository: '@Devture\Bundle\NagiosBundle\Repository\ServiceRepository'
                devture_nagios.contact.repository: '@Devture\Bundle\NagiosBundle\Repository\ContactRepository'
    Devture\Bundle\NagiosBundle\Event\Subscriber\TimePeriodEventsSubscriber:
        arguments:
            $container: !service_locator
                devture_nagios.contact.repository: '@Devture\Bundle\NagiosBundle\Repository\ContactRepository'

    # The model-event dispatcher gets the subscribers registered on it. Subscribers
    # are listed above and added here (the repositories dispatch model events to it).
    nagadmin.model_event_dispatcher:
        class: Symfony\Component\EventDispatcher\EventDispatcher
        calls:
            - addSubscriber: ['@Devture\Bundle\NagiosBundle\Event\Subscriber\HostEventsSubscriber']
            - addSubscriber: ['@Devture\Bundle\NagiosBundle\Event\Subscriber\ContactEventsSubscriber']
            - addSubscriber: ['@Devture\Bundle\NagiosBundle\Event\Subscriber\CommandEventsSubscriber']
            - addSubscriber: ['@Devture\Bundle\NagiosBundle\Event\Subscriber\TimePeriodEventsSubscriber']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
