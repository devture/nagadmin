# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    nagadmin.mongodb.uri: '%env(MONGODB_URI)%'
    nagadmin.mongodb.db: '%env(MONGODB_DB)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        # The ported domain code under src/Devture/ lives in its own namespaces
        # (not App\), so it must be excluded from App\ autodiscovery. It autoloads
        # via composer PSR-4 and is wired explicitly where needed.
        exclude:
            - '../src/Devture/'

    # The MongoDB connection. The `array` type map makes find()/findOne() return
    # plain PHP arrays (not BSONDocument/BSONArray objects), matching what the
    # data models expect — mirroring the legacy application's wiring.
    MongoDB\Client:
        arguments:
            $uri: '%nagadmin.mongodb.uri%'

    MongoDB\Database:
        factory: ['@MongoDB\Client', 'selectDatabase']
        arguments:
            $databaseName: '%nagadmin.mongodb.db%'
            $options:
                typeMap: { root: array, document: array, array: array }

    # A dedicated dispatcher for model lifecycle events (cascade updates/deletes).
    # The subscribers that act on these events are wired in a later step.
    nagadmin.model_event_dispatcher:
        class: Symfony\Component\EventDispatcher\EventDispatcher

    # The Nagios repositories. Concrete-typed dependencies (sibling repositories,
    # the MongoDB database) autowire; the model-event dispatcher is bound explicitly.
    Devture\Bundle\NagiosBundle\Repository\TimePeriodRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\CommandRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\HostRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\ContactRepository:
        arguments:
            $dispatcher: '@nagadmin.model_event_dispatcher'
    Devture\Bundle\NagiosBundle\Repository\ServiceRepository: ~
    Devture\Bundle\NagiosBundle\Repository\ResourceRepository: ~
    Devture\Bundle\NagiosBundle\Repository\UserRepository: ~

    # The contact repository depends on the user repository via its interface.
    Devture\Bundle\UserBundle\Repository\UserRepositoryInterface: '@Devture\Bundle\NagiosBundle\Repository\UserRepository'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
