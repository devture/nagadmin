server {
        listen *:8080 default_server;

        server_name dev;
        server_tokens off;

        client_max_body_size 20M;

        gzip on;
        gzip_types
                application/atom+xml
                application/javascript
                application/json
                application/rss+xml
                application/vnd.ms-fontobject
                application/x-font-ttf
                application/x-web-app-manifest+json
                application/xhtml+xml
                application/xml
                font/opentype
                image/svg+xml
                image/x-icon
                text/css
                text/plain
                text/x-component;
                # text/html is always compressed by HttpGzipModule

        location ~* \.(css|js)$ {
                if ($args ~* [0-9]+$) {
                        expires max;
                        break;
                }
        }

        root /public;

        location / {
                try_files $uri $uri/index.html @others;

                location ~ \.php$ {
                        fastcgi_pass php:9000;
                        fastcgi_param SCRIPT_FILENAME /code/app/public/$fastcgi_script_name;
                        # The Symfony kernel keeps its mutable runtime state (cache/log)
                        # here rather than under app/var, so the php container (running as
                        # the Nagios uid) writes to a directory it owns in the prepared
                        # var/ tree. Passed per-request so it reaches PHP regardless of the
                        # fpm pool's clear_env setting.
                        fastcgi_param NAGADMIN_RUNTIME_DIR /code/var/cache;
                        include fastcgi_params;
                }
        }
        location @others {
                rewrite ^(.*)$ /index.php last;
        }
}
