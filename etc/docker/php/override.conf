[global]
; Log to the container's stderr. The Alpine php-fpm package defaults this to a
; root-owned file under /var/log that the unprivileged run user cannot open.
error_log = /dev/stderr

[www]
; Listen on all interfaces so nginx can reach php-fpm over the compose network
; as `php:9000` (the Alpine php-fpm package defaults to listening on 127.0.0.1).
listen = 0.0.0.0:9000

; Forward each worker's stdout/stderr to the FPM master's error_log (the
; container's stderr, set above) rather than letting it leak back to nginx over
; the FastCGI stderr channel — where the application's log output would otherwise
; be relabelled as nginx `[error]`. `decorate_workers_output = no` keeps the lines
; verbatim, without FPM's "child N said into stderr" wrapper.
catch_workers_output = yes
decorate_workers_output = no
php_admin_flag[log_errors]=On
php_admin_value[error_reporting] = E_ALL
php_admin_value[post_max_size] = 20M
php_admin_value[upload_max_filesize] = 20M
php_admin_value[memory_limit] = 256M
